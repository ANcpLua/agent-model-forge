[workspace]
name = "codex-forge"
default_agent = "forge-builder"
rule_file = ".codex/rules/runtime.rules"

[agents]
max_threads = 4
max_depth = 1
generated_dir = ".codex/agents/generated"

[models]
fast = "gpt-5.3-codex-spark"
deep = "gpt-5.4"

[routing]
review_agent = "skeptic"
research_agent = "pathfinder"

[skills]
runtime_dir = ".agents/skills/generated"
catalog_dir = "skills"
system_dir = "skills/.system"
curated_dir = "skills/.curated"
experimental_dir = "skills/.experimental"
